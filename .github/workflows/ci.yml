name: CI/CD

on:
  pull_request:
  push:
    branches: [master]

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - uses: actions/checkout@v4

      - name: Fix shebang & permissions (Windows compatibility)
        run: |
          chmod +x bin/* || true
          sed -i 's/ruby.exe/ruby/g' bin/* || true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

  scan_ruby:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Fix bin
        run: chmod +x bin/* && sed -i 's/ruby.exe/ruby/g' bin/* || true

      - name: Brakeman scan
        run: bundle exec brakeman --no-pager

      - name: Bundler audit
        run: bundle exec bundler-audit

  scan_js:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Fix bin
        run: chmod +x bin/* || true

      - name: Importmap audit (optional)
        run: |
          if [ -f "bin/importmap" ]; then
            bundle exec importmap audit
          else
            echo "No importmap, skipping..."
          fi

  lint:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Fix bin
        run: chmod +x bin/* && sed -i 's/ruby.exe/ruby/g' bin/* || true

      - name: Run Rubocop
        run: bundle exec rubocop -f github

  test:
    runs-on: ubuntu-latest
    needs: setup

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: true
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y default-libmysqlclient-dev libvips

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Fix bin
        run: chmod +x bin/* && sed -i 's/ruby.exe/ruby/g' bin/* || true

      - name: Run tests
        env:
          RAILS_ENV: test
          DATABASE_URL: mysql2://root@127.0.0.1:3306/test
        run: bundle exec rails db:test:prepare test

  deploy:
    name: Deploy to VPS
    needs: [test, lint, scan_ruby, scan_js]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            APP_DIR="/faidfadjri/chatroom"

            if [ ! -d "$APP_DIR" ]; then
              git clone https://github.com/faidfadjri/realtime-chat.git $APP_DIR
            fi

            cd $APP_DIR

            git pull origin master

            docker compose down
            docker compose up -d --build

            echo "✅ Deployment success"
